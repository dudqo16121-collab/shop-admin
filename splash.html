<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ShopAdmin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      background: #1A1917;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: -apple-system, 'Inter', system-ui, sans-serif;
      overflow: hidden; user-select: none;
    }
    .logo-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
      animation: fadeIn 0.5s ease-out;
    }
    .logo-box {
      width: 80px; height: 80px;
      background: #F0EEE8; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 800; color: #1A1917;
      letter-spacing: -1px;
    }
    .logo-name {
      font-size: 28px; font-weight: 800;
      color: #F0EEE8; letter-spacing: -0.8px;
    }
    .logo-sub {
      font-size: 13px; color: #6B6963;
      margin-top: -12px; letter-spacing: 0.02em;
    }
    .progress-wrap {
      margin-top: 48px; width: 160px;
      display: flex; flex-direction: column; gap: 8px;
      align-items: center;
    }
    .progress-bg {
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #F0EEE8;
      border-radius: 2px;
      animation: progress 2s ease-in-out forwards;
    }
    .progress-text {
      font-size: 11px; color: #6B6963;
    }
    .version {
      position: absolute; bottom: 20px;
      font-size: 10px; color: #444240;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes progress {
      0%   { width: 0%; }
      30%  { width: 40%; }
      60%  { width: 70%; }
      85%  { width: 88%; }
      100% { width: 100%; }
    }
    .dots {
      display: flex; gap: 6px; margin-top: 4px;
    }
    .dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: #444240; animation: dotPulse 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%,80%,100% { background: #444240; transform: scale(1); }
      40% { background: #A09D97; transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-box">S</div>
    <div class="logo-name">ShopAdmin</div>
    <div class="logo-sub">이커머스 관리자 플랫폼</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bg">
      <div class="progress-fill" id="bar"></div>
    </div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="progress-text" id="msg">초기화 중...</div>
  </div>
  <div class="version">v0.1.0</div>
  <script>
    const msgs = ["초기화 중...", "데이터 로딩 중...", "거의 다 됐어요..."];
    let i = 0;
    const el = document.getElementById("msg");
    const interval = setInterval(() => {
      i = Math.min(i + 1, msgs.length - 1);
      el.textContent = msgs[i];
      if (i === msgs.length - 1) clearInterval(interval);
    }, 700);
  </script>
</body>
</html>
